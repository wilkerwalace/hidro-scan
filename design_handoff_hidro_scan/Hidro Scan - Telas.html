<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hidro Scan · Telas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  html, body {
    margin: 0; padding: 0;
    font-family: "Outfit", -apple-system, system-ui, sans-serif;
    color: #0A0A0A;
    -webkit-font-smoothing: antialiased;
  }
  * { box-sizing: border-box; }

  /* ── Glass orbs (same as main app) ─────────────────────────── */
  .hs-glass-orbs { position: absolute; inset: 0; overflow: hidden; border-radius: 24px; }
  .hs-orb { position: absolute; border-radius: 50%; filter: blur(28px); will-change: transform; }
  .hs-orb-a { width: 70%; height: 110%; left: -10%; top: -20%; opacity: .85; animation: orbA 8s ease-in-out infinite; }
  .hs-orb-b { width: 60%; height: 90%; right: -20%; top: 20%; opacity: .55; animation: orbB 11s ease-in-out infinite; }
  .hs-orb-c { width: 45%; height: 70%; left: 25%; bottom: -30%; opacity: .35; animation: orbC 14s ease-in-out infinite; }
  @keyframes orbA { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(8%, 6%) scale(1.05); } }
  @keyframes orbB { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-10%, -4%) scale(1.1); } }
  @keyframes orbC { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(6%, -8%) scale(0.95); } }

  .hs-shimmer { animation: shimmer 3.5s ease-in-out infinite; }
  @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

  .hs-scan { top: 0; animation: scan 2.4s ease-in-out infinite; }
  @keyframes scan { 0% { top: 6px; opacity: 0; } 20% { opacity: 1; } 80% { opacity: 1; } 100% { top: calc(100% - 8px); opacity: 0; } }

  .hs-strip-float { animation: float 4s ease-in-out infinite; }
  @keyframes float { 0%,100% { transform: translate(-50%, -50%) rotate(-6deg); } 50% { transform: translate(-50%, -52%) rotate(-7deg); } }

  .hs-pulse { animation: pulse 2.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { transform: scale(.85); opacity: .55; } 50% { transform: scale(1.1); opacity: .85; } }

  .hs-wave { animation: wave 4s ease-in-out infinite; }
  @keyframes wave { 0%,100% { transform: translateY(0) skewX(0deg); } 50% { transform: translateY(-6%) skewX(-3deg); } }

  .hs-fade-in { animation: fadeIn .4s ease-out both; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .hs-dot-blink { animation: blink 1.2s ease-in-out infinite; }
  @keyframes blink { 0%,100% { opacity: .25; } 50% { opacity: 1; } }

  .screen-host *::-webkit-scrollbar { display: none; }
  .screen-host * { scrollbar-width: none; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="screens-main.jsx"></script>
  <script type="text/babel" src="screens-capture.jsx"></script>

  <script type="text/babel">
    const DEVICE_W = 393;
    const DEVICE_H = 852;
    const NOOP = () => {};

    // Frame wraps each screen in the iOS device for screenshot consistency
    function Frame({ children, primary = '#76FB91' }) {
      return (
        <div className="screen-host" style={{
          width: DEVICE_W, height: DEVICE_H,
          position: 'relative', overflow: 'hidden',
          borderRadius: 0,
        }}>
          <IOSDevice width={DEVICE_W} height={DEVICE_H}>
            <div style={{
              position: 'absolute', inset: 0, overflow: 'hidden',
              background: '#FAFAFA', isolation: 'isolate',
            }}>
              {children}
            </div>
          </IOSDevice>
        </div>
      );
    }

    // Builds a "page" wrapper that mimics the navigated route
    function Page({ children, primary = '#76FB91', nav = 'home' }) {
      return (
        <Frame primary={primary}>
          {children}
          <BottomNav current={nav} primary={primary} onNav={NOOP}/>
        </Frame>
      );
    }

    // Mock records used by Home/Detail
    function mockRecords(uc) {
      const recs = [];
      uc.samples.forEach((s) => {
        const h = HISTORY[s.id] || [];
        h.slice(-6).forEach((entry, i) => {
          recs.push({
            id: `mock-${s.id}-${i}`,
            sampleId: s.id,
            ph: entry.ph,
            ts: entry.date,
            photos: [phToColor(entry.ph), phToColor(entry.ph + 0.1), phToColor(entry.ph - 0.05)],
            confidence: 0.86 + Math.random() * 0.1,
          });
        });
      });
      return recs.sort((a, b) => new Date(b.ts) - new Date(a.ts));
    }

    // Wraps a CaptureScreen frozen at a specific stage. Because CaptureScreen
    // owns the stage state, we render simplified static versions of each stage.
    function StaticViewfinder({ uc, primary, photos }) {
      const sample = uc.samples[0];
      return (
        <Frame primary={primary}>
          {/* Reuse the internal ViewfinderStage by mounting a CaptureScreen
              wrapper isn't possible (stage state). So we inline the markup
              by rendering a no-op CaptureScreen child via window helpers. */}
          <CaptureViewfinderShim uc={uc} primary={primary} photos={photos} sample={sample}/>
        </Frame>
      );
    }

    // Lightweight rebuild for static screenshots — pulls visuals from
    // screens-capture but doesn't drive the timer.
    function CaptureViewfinderShim({ uc, primary, photos, sample }) {
      return (
        <div style={{ position: 'absolute', inset: 0, background: '#0A0A0A', color: '#fff', overflow: 'hidden' }}>
          <div style={{
            position: 'absolute', inset: 0,
            background: 'radial-gradient(ellipse at center, #2a2a2a 0%, #0A0A0A 75%)',
          }}>
            <div style={{
              position: 'absolute', inset: '12% 8%', borderRadius: 24,
              background: uc.id === 'pool'
                ? 'radial-gradient(ellipse at 30% 20%, rgba(120,200,255,.25), transparent 70%), radial-gradient(ellipse at 70% 80%, rgba(60,140,210,.18), transparent 70%), #143b5c'
                : 'radial-gradient(ellipse at 30% 20%, rgba(120,255,180,.18), transparent 70%), radial-gradient(ellipse at 70% 80%, rgba(80,180,90,.15), transparent 70%), #0e2418',
              opacity: .8,
            }}/>
          </div>

          {/* Test strip */}
          <div className="hs-strip-float" style={{
            position: 'absolute', left: '50%', top: '46%',
            transform: 'translate(-50%, -50%) rotate(-6deg)',
            width: 80, height: 280, borderRadius: 14,
            background: 'linear-gradient(180deg, #FAFAFA 0%, #F0F0F0 30%, ' +
              phToColor(sample.last - 0.4) + ' 50%, ' +
              phToColor(sample.last) + ' 72%, ' +
              phToColor(sample.last + 0.3) + ' 95%)',
            boxShadow: '0 12px 40px rgba(0,0,0,.5)',
            zIndex: 2,
          }}/>

          {/* Crosshair */}
          <div style={{
            position: 'absolute', left: '50%', top: '46%', transform: 'translate(-50%, -50%)',
            width: 220, height: 320, pointerEvents: 'none', zIndex: 3,
          }}>
            {[[0,0],[1,0],[0,1],[1,1]].map(([x,y], k) => (
              <div key={k} style={{
                position: 'absolute',
                [x === 0 ? 'left' : 'right']: -2,
                [y === 0 ? 'top' : 'bottom']: -2,
                width: 28, height: 28,
                borderTop: y === 0 ? '3px solid rgba(255,255,255,.85)' : 'none',
                borderBottom: y === 1 ? '3px solid rgba(255,255,255,.85)' : 'none',
                borderLeft: x === 0 ? '3px solid rgba(255,255,255,.85)' : 'none',
                borderRight: x === 1 ? '3px solid rgba(255,255,255,.85)' : 'none',
                borderRadius: 6,
              }}/>
            ))}
            <div className="hs-scan" style={{
              position: 'absolute', left: 6, right: 6, height: 2,
              background: 'linear-gradient(90deg, transparent, rgba(118,251,145,.9), transparent)',
              boxShadow: '0 0 12px rgba(118,251,145,.7)',
            }}/>
          </div>

          {/* Top bar */}
          <div style={{
            position: 'absolute', top: 60, left: 16, right: 16, zIndex: 10,
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          }}>
            <div style={{ width: 38, height: 38, borderRadius: 12, background: 'rgba(255,255,255,.15)',
              backdropFilter: 'blur(10px)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <Icon name="x" size={18} color="#fff"/>
            </div>
            <div style={{ padding: '8px 14px', borderRadius: 999,
              background: 'rgba(255,255,255,.15)', backdropFilter: 'blur(10px)',
              fontSize: 12, fontWeight: 500, display: 'inline-flex', alignItems: 'center', gap: 6 }}>
              <Icon name={sample.icon} size={14} color="#fff" strokeWidth={1.8}/> {sample.name}
            </div>
            <div style={{ width: 38, height: 38, borderRadius: 12, background: primary,
              color: '#0A0A0A', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <Icon name="flash" size={16} color="currentColor"/>
            </div>
          </div>

          {/* Instruction pill */}
          <div style={{
            position: 'absolute', top: 116, left: '50%', transform: 'translateX(-50%)',
            padding: '10px 16px', borderRadius: 16, zIndex: 10,
            background: 'rgba(0,0,0,.5)', backdropFilter: 'blur(10px)',
            display: 'flex', alignItems: 'center', gap: 10,
          }}>
            <div style={{
              width: 22, height: 22, borderRadius: 22,
              background: primary, color: '#0A0A0A',
              fontSize: 11, fontWeight: 600,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>{photos.length}/3</div>
            <div>
              <div style={{ fontSize: 12, fontWeight: 500 }}>
                {photos.length < 3 ? `Tire mais ${3 - photos.length} foto${3-photos.length>1?'s':''}` : 'Pronto para analisar'}
              </div>
              <div style={{ fontSize: 10, opacity: .65 }}>Flash ativo · Alinhe a tira</div>
            </div>
          </div>

          {/* Bottom controls */}
          <div style={{
            position: 'absolute', bottom: 60, left: 0, right: 0, zIndex: 10,
            display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 22,
          }}>
            <div style={{ display: 'flex', gap: 8 }}>
              {Array.from({ length: 3 }).map((_, i) => {
                const p = photos[i];
                const isNext = i === photos.length;
                return (
                  <div key={i} style={{
                    width: 44, height: 56, borderRadius: 8,
                    background: p ? p.color : 'rgba(255,255,255,.08)',
                    border: isNext ? '1.5px dashed rgba(255,255,255,.45)' : '1.5px solid rgba(255,255,255,.18)',
                    position: 'relative',
                  }}>
                    {p && (
                      <div style={{
                        position: 'absolute', bottom: 3, left: 0, right: 0, textAlign: 'center',
                        fontSize: 9, color: '#fff',
                        textShadow: '0 1px 2px rgba(0,0,0,.5)',
                      }}>{p.ph.toFixed(1)}</div>
                    )}
                  </div>
                );
              })}
            </div>

            <div style={{ display: 'flex', alignItems: 'center', gap: 28 }}>
              <div style={{
                width: 50, height: 50, borderRadius: 14,
                background: 'rgba(255,255,255,.12)', backdropFilter: 'blur(10px)',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}>
                <Icon name="grid" size={20} color="#fff"/>
              </div>
              <div style={{
                width: 78, height: 78, borderRadius: 999,
                background: '#fff', padding: 4,
                boxShadow: '0 0 0 4px rgba(255,255,255,.25), 0 8px 24px rgba(0,0,0,.4)',
              }}>
                <div style={{ width: '100%', height: '100%', borderRadius: 999, background: primary, boxShadow: 'inset 0 0 0 2px #fff' }}/>
              </div>
              <div style={{
                width: 50, height: 50, borderRadius: 14,
                background: photos.length >= 3 ? primary : 'rgba(255,255,255,.12)',
                color: photos.length >= 3 ? '#0A0A0A' : 'rgba(255,255,255,.4)',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}>
                <Icon name="check" size={22} color="currentColor"/>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function Canvas() {
      const pool = USE_CASES.pool;
      const aquarium = USE_CASES.aquarium;
      const mint = '#76FB91';

      // Adaptive color sample (for pool)
      const avg = pool.samples.reduce((a,s)=>a+s.last,0) / pool.samples.length;
      const adaptive = phToColor(avg);

      const records = mockRecords(pool);
      const aqRecords = mockRecords(aquarium);

      const sampleRec = records[0];
      const photos = [
        { ph: 7.41, color: phToColor(7.41) },
        { ph: 7.38, color: phToColor(7.38) },
        { ph: 7.46, color: phToColor(7.46) },
      ];

      return (
        <DesignCanvas title="Hidro Scan · Telas">
          <DCSection id="flow-pool" title="Fluxo principal · Piscina"
                     subtitle="Da introdução ao resultado, com cor verde fixa">

            <DCArtboard id="onb-1" label="Introdução · 1" width={DEVICE_W} height={DEVICE_H}>
              <OnbStep step={0} primary={mint} useCase="pool"/>
            </DCArtboard>

            <DCArtboard id="onb-2" label="Introdução · 2" width={DEVICE_W} height={DEVICE_H}>
              <OnbStep step={1} primary={mint} useCase="pool"/>
            </DCArtboard>

            <DCArtboard id="onb-3" label="Introdução · 3" width={DEVICE_W} height={DEVICE_H}>
              <OnbStep step={2} primary={mint} useCase="pool"/>
            </DCArtboard>

            <DCArtboard id="home-pool" label="Visão Geral · Piscina" width={DEVICE_W} height={DEVICE_H}>
              <Page primary={mint} nav="home">
                <HomeScreen uc={pool} primary={mint} history={HISTORY} records={records}
                  onSample={NOOP} onCapture={NOOP} onOpenRecord={NOOP} onNotifications={NOOP}/>
              </Page>
            </DCArtboard>

            <DCArtboard id="samples-pool" label="Minhas piscinas" width={DEVICE_W} height={DEVICE_H}>
              <Page primary={mint} nav="samples">
                <SamplesScreen uc={pool} primary={mint} history={HISTORY} onAdd={NOOP} onOpen={NOOP}/>
              </Page>
            </DCArtboard>

            <DCArtboard id="capture-1" label="Câmera · 1 foto" width={DEVICE_W} height={DEVICE_H}>
              <StaticViewfinder uc={pool} primary={mint} photos={photos.slice(0, 1)}/>
            </DCArtboard>

            <DCArtboard id="capture-3" label="Câmera · 3 fotos" width={DEVICE_W} height={DEVICE_H}>
              <StaticViewfinder uc={pool} primary={mint} photos={photos}/>
            </DCArtboard>

            <DCArtboard id="analyzing" label="Analisando" width={DEVICE_W} height={DEVICE_H}>
              <Frame primary={mint}>
                <AnalyzingStage primary={mint} photos={photos}
                  animPh={7.41} finalPh={7.41} sample={pool.samples[0]}/>
              </Frame>
            </DCArtboard>

            <DCArtboard id="result-ideal" label="Resultado · Ideal" width={DEVICE_W} height={DEVICE_H}>
              <Frame primary={mint}>
                <ResultStage uc={pool} primary={mint}
                  ph={7.41} sample={pool.samples[0]} photos={photos}
                  confidence={0.94} onSave={NOOP} onRetake={NOOP}/>
              </Frame>
            </DCArtboard>

            <DCArtboard id="result-high" label="Resultado · Alto" width={DEVICE_W} height={DEVICE_H}>
              <Frame primary={mint}>
                <ResultStage uc={pool} primary={mint}
                  ph={7.92} sample={pool.samples[1]}
                  photos={[{ph:7.88,color:phToColor(7.88)},{ph:7.94,color:phToColor(7.94)},{ph:7.91,color:phToColor(7.91)}]}
                  confidence={0.91} onSave={NOOP} onRetake={NOOP}/>
              </Frame>
            </DCArtboard>

            <DCArtboard id="result-low" label="Resultado · Baixo" width={DEVICE_W} height={DEVICE_H}>
              <Frame primary={mint}>
                <ResultStage uc={pool} primary={mint}
                  ph={6.62} sample={pool.samples[2]}
                  photos={[{ph:6.58,color:phToColor(6.58)},{ph:6.64,color:phToColor(6.64)},{ph:6.65,color:phToColor(6.65)}]}
                  confidence={0.89} onSave={NOOP} onRetake={NOOP}/>
              </Frame>
            </DCArtboard>

            <DCArtboard id="detail-pool" label="Detalhe do registro" width={DEVICE_W} height={DEVICE_H}>
              <Frame primary={mint}>
                <DetailScreen uc={pool} primary={mint} record={sampleRec} onBack={NOOP}/>
              </Frame>
            </DCArtboard>

            <DCArtboard id="reminders-pool" label="Lembretes" width={DEVICE_W} height={DEVICE_H}>
              <Page primary={mint} nav="reminders">
                <RemindersScreen uc={pool} primary={mint}/>
              </Page>
            </DCArtboard>

            <DCArtboard id="profile-pool" label="Perfil" width={DEVICE_W} height={DEVICE_H}>
              <Page primary={mint} nav="profile">
                <ProfileScreen uc={pool} primary={mint} mode="pool" setMode={NOOP}/>
              </Page>
            </DCArtboard>
          </DCSection>

          <DCSection id="flow-aquarium" title="Fluxo principal · Aquário"
                     subtitle="Mesmo app com copy adaptado e amostras de aquário">

            <DCArtboard id="home-aq" label="Visão Geral · Aquário" width={DEVICE_W} height={DEVICE_H}>
              <Page primary={mint} nav="home">
                <HomeScreen uc={aquarium} primary={mint} history={HISTORY} records={aqRecords}
                  onSample={NOOP} onCapture={NOOP} onOpenRecord={NOOP} onNotifications={NOOP}/>
              </Page>
            </DCArtboard>

            <DCArtboard id="samples-aq" label="Meus aquários" width={DEVICE_W} height={DEVICE_H}>
              <Page primary={mint} nav="samples">
                <SamplesScreen uc={aquarium} primary={mint} history={HISTORY} onAdd={NOOP} onOpen={NOOP}/>
              </Page>
            </DCArtboard>

            <DCArtboard id="result-aq-high" label="Resultado · Marinho" width={DEVICE_W} height={DEVICE_H}>
              <Frame primary={mint}>
                <ResultStage uc={aquarium} primary={mint}
                  ph={8.22} sample={aquarium.samples[1]}
                  photos={[{ph:8.18,color:phToColor(8.18)},{ph:8.24,color:phToColor(8.24)},{ph:8.24,color:phToColor(8.24)}]}
                  confidence={0.95} onSave={NOOP} onRetake={NOOP}/>
              </Frame>
            </DCArtboard>

            <DCArtboard id="reminders-aq" label="Lembretes · Aquário" width={DEVICE_W} height={DEVICE_H}>
              <Page primary={mint} nav="reminders">
                <RemindersScreen uc={aquarium} primary={mint}/>
              </Page>
            </DCArtboard>
          </DCSection>

          <DCSection id="color-variants" title="Variações de cor primária"
                     subtitle="Verde fixa · pH adaptativa · Quente">

            <DCArtboard id="home-mint" label="Verde · #76FB91" width={DEVICE_W} height={DEVICE_H}>
              <Page primary="#76FB91" nav="home">
                <HomeScreen uc={pool} primary="#76FB91" history={HISTORY} records={records}
                  onSample={NOOP} onCapture={NOOP} onOpenRecord={NOOP} onNotifications={NOOP}/>
              </Page>
            </DCArtboard>

            <DCArtboard id="home-adaptive" label="pH adaptativa" width={DEVICE_W} height={DEVICE_H}>
              <Page primary={adaptive} nav="home">
                <HomeScreen uc={pool} primary={adaptive} history={HISTORY} records={records}
                  onSample={NOOP} onCapture={NOOP} onOpenRecord={NOOP} onNotifications={NOOP}/>
              </Page>
            </DCArtboard>

            <DCArtboard id="home-warm" label="Quente · #FFD66B" width={DEVICE_W} height={DEVICE_H}>
              <Page primary="#FFD66B" nav="home">
                <HomeScreen uc={pool} primary="#FFD66B" history={HISTORY} records={records}
                  onSample={NOOP} onCapture={NOOP} onOpenRecord={NOOP} onNotifications={NOOP}/>
              </Page>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    // Helper: render a single onboarding step statically by forcing the
    // internal step state of OnboardingScreen via a remount key.
    function OnbStep({ step, primary, useCase }) {
      const [s, setS] = React.useState(step);
      const [uc, setUc] = React.useState(useCase);
      // Wrap: we tap into the existing OnboardingScreen — which manages its
      // own step. To make this static at a specific step, we mount a copy
      // that ignores its onDone and use a key to remount fresh.
      // Simpler: replicate small adapter that just calls OnboardingScreen
      // and synthesises step by re-mounting and clicking through.
      // Cleanest: inline a static version that mirrors the slide markup.
      const slides = [
        { title: 'Meça o pH com sua câmera',
          sub: 'Hidro Scan analisa fotos de tiras de teste e devolve o pH em segundos.',
          visual: 'drop' },
        { title: 'Tire 3 fotos com flash',
          sub: 'Capturas acumulativas reduzem o erro de iluminação. Vamos te guiar.',
          visual: 'camera' },
        { title: 'O que você monitora?',
          sub: 'Personalize as faixas seguras e as recomendações.',
          visual: 'pick' },
      ][step];

      return (
        <Frame primary={primary}>
          <div style={{
            position: 'absolute', inset: 0, padding: '70px 24px 40px',
            display: 'flex', flexDirection: 'column', background: '#FAFAFA',
          }}>
            <div style={{ display: 'flex', gap: 6, marginBottom: 32 }}>
              {[0,1,2].map(i => (
                <div key={i} style={{
                  flex: 1, height: 3, borderRadius: 2,
                  background: i <= step ? '#0A0A0A' : 'rgba(0,0,0,.1)',
                }}/>
              ))}
            </div>
            <div style={{ height: 280, borderRadius: 28, marginBottom: 24 }}>
              <GlassCard primary={primary} padding={0} style={{ height: '100%' }}>
                <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  {slides.visual === 'drop' && (
                    <div style={{ textAlign: 'center' }}>
                      <Logo size={88} primary={primary} />
                      <div style={{
                        fontFamily: '"Outfit", sans-serif', fontWeight: 300, fontSize: 32,
                        marginTop: 18, letterSpacing: '-0.02em',
                      }}>Hidro Scan</div>
                    </div>
                  )}
                  {slides.visual === 'camera' && (
                    <div style={{ position: 'relative', width: 180, height: 180 }}>
                      <div style={{
                        position: 'absolute', left: '50%', top: '50%',
                        transform: 'translate(-50%,-50%) rotate(-8deg)',
                        width: 60, height: 200, borderRadius: 10,
                        background: 'linear-gradient(180deg, #fff 0%, #fff 60%, ' + phToColor(7) + ' 60%, ' + phToColor(7) + ' 100%)',
                        boxShadow: '0 8px 24px rgba(0,0,0,.15)',
                      }}/>
                      {[[0,0,'tl'],[1,0,'tr'],[0,1,'bl'],[1,1,'br']].map(([x,y,k]) => (
                        <div key={k} style={{
                          position: 'absolute',
                          [x === 0 ? 'left' : 'right']: 0,
                          [y === 0 ? 'top' : 'bottom']: 0,
                          width: 30, height: 30,
                          borderTop: y === 0 ? '2.5px solid #0A0A0A' : 'none',
                          borderBottom: y === 1 ? '2.5px solid #0A0A0A' : 'none',
                          borderLeft: x === 0 ? '2.5px solid #0A0A0A' : 'none',
                          borderRight: x === 1 ? '2.5px solid #0A0A0A' : 'none',
                          borderRadius: 4,
                        }}/>
                      ))}
                    </div>
                  )}
                  {slides.visual === 'pick' && (
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 12, width: '78%' }}>
                      {Object.values(USE_CASES).map(u => (
                        <div key={u.id} style={{
                          display: 'flex', alignItems: 'center', gap: 14,
                          padding: '14px 16px', borderRadius: 18,
                          background: u.id === 'pool' ? '#0A0A0A' : 'rgba(255,255,255,.7)',
                          color: u.id === 'pool' ? '#fff' : '#0A0A0A',
                          boxShadow: u.id === 'pool' ? '0 4px 12px rgba(0,0,0,.2)' : '0 0 0 0.5px rgba(0,0,0,.08)',
                        }}>
                          <Icon name={u.samples[0].icon} size={22} color={u.id === 'pool' ? '#fff' : '#0A0A0A'} strokeWidth={1.8}/>
                          <div style={{ textAlign: 'left' }}>
                            <div style={{ fontWeight: 500, fontSize: 14 }}>{u.name}</div>
                            <div style={{ fontSize: 11, opacity: .6 }}>Faixa: {u.safeRange[0]} – {u.safeRange[1]}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </GlassCard>
            </div>
            <div style={{ fontSize: 11, color: 'rgba(0,0,0,.5)', marginBottom: 6 }}>
              Passo {step + 1} de 3
            </div>
            <h1 style={{
              fontFamily: '"Outfit", sans-serif', fontWeight: 400, fontSize: 32,
              margin: 0, lineHeight: 1.1, letterSpacing: '-0.02em',
            }}>{slides.title}</h1>
            <p style={{ margin: '14px 0 0', color: 'rgba(0,0,0,.6)', fontSize: 14, lineHeight: 1.5 }}>
              {slides.sub}
            </p>
            <div style={{ flex: 1 }}/>
            <div style={{ display: 'flex', gap: 10 }}>
              {step > 0 && (
                <div style={{
                  border: '0.5px solid rgba(0,0,0,.1)', background: 'transparent',
                  width: 54, height: 54, borderRadius: 18,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                }}>
                  <Icon name="chevL" size={20}/>
                </div>
              )}
              <div style={{
                flex: 1, height: 54, borderRadius: 18,
                background: '#0A0A0A', color: '#fff',
                fontWeight: 500, fontSize: 15,
                display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
                boxShadow: '0 8px 20px rgba(0,0,0,.25)',
              }}>
                {step < 2 ? 'Continuar' : 'Começar a medir'}
                <Icon name="chevR" size={16} color="#fff"/>
              </div>
            </div>
          </div>
        </Frame>
      );
    }

    function boot() {
      if (!window.DesignCanvas || !window.HomeScreen || !window.CaptureScreen || !window.IOSDevice) {
        return setTimeout(boot, 60);
      }
      ReactDOM.createRoot(document.getElementById('root')).render(<Canvas/>);
    }
    boot();
  </script>
</body>
</html>
