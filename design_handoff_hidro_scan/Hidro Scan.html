<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hidro Scan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  html, body {
    margin: 0; padding: 0;
    background: #ECECEC;
    font-family: "Outfit", -apple-system, system-ui, sans-serif;
    color: #0A0A0A;
    overflow: hidden;
    height: 100%;
    -webkit-font-smoothing: antialiased;
  }
  * { box-sizing: border-box; }
  #stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(ellipse 60% 40% at 50% 30%, #F4F4F4 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 50% 70%, #E8E8E8 0%, transparent 60%),
      #ECECEC;
  }
  .hs-host {
    transform-origin: center center;
  }

  /* ──────────────────────────────────────────────────────────────
     Glass card animated orbs (reactive "waves")
  ────────────────────────────────────────────────────────────── */
  .hs-glass-orbs { position: absolute; inset: 0; overflow: hidden; }
  .hs-orb {
    position: absolute; border-radius: 50%;
    filter: blur(28px);
    will-change: transform;
  }
  .hs-orb-a {
    width: 70%; height: 110%;
    left: -10%; top: -20%;
    opacity: .85;
    animation: orbA 8s ease-in-out infinite;
  }
  .hs-orb-b {
    width: 60%; height: 90%;
    right: -20%; top: 20%;
    opacity: .55;
    animation: orbB 11s ease-in-out infinite;
  }
  .hs-orb-c {
    width: 45%; height: 70%;
    left: 25%; bottom: -30%;
    opacity: .35;
    animation: orbC 14s ease-in-out infinite;
  }
  @keyframes orbA {
    0%,100% { transform: translate(0,0) scale(1); }
    50%     { transform: translate(8%, 6%) scale(1.05); }
  }
  @keyframes orbB {
    0%,100% { transform: translate(0,0) scale(1); }
    50%     { transform: translate(-10%, -4%) scale(1.1); }
  }
  @keyframes orbC {
    0%,100% { transform: translate(0,0) scale(1); }
    50%     { transform: translate(6%, -8%) scale(0.95); }
  }

  /* ──────────────────────────────────────────────────────────────
     pH spectrum shimmer
  ────────────────────────────────────────────────────────────── */
  .hs-shimmer {
    animation: shimmer 3.5s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  /* ──────────────────────────────────────────────────────────────
     Camera scan line
  ────────────────────────────────────────────────────────────── */
  .hs-scan {
    top: 0;
    animation: scan 2.4s ease-in-out infinite;
  }
  @keyframes scan {
    0%   { top: 6px;   opacity: 0; }
    20%  { opacity: 1; }
    80%  { opacity: 1; }
    100% { top: calc(100% - 8px); opacity: 0; }
  }

  /* Flash strobe */
  .hs-flash { animation: flash .2s ease-out; }
  @keyframes flash {
    0%   { opacity: 0; }
    20%  { opacity: 1; }
    100% { opacity: 0; }
  }

  /* Strip subtle float in viewfinder */
  .hs-strip-float {
    animation: float 4s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translate(-50%, -50%) rotate(-6deg); }
    50%     { transform: translate(-50%, -52%) rotate(-7deg); }
  }

  /* Analyzing pulse */
  .hs-pulse {
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { transform: scale(.85); opacity: .55; }
    50%     { transform: scale(1.1);  opacity: .85; }
  }

  /* Wave inside the result color tile */
  .hs-wave {
    animation: wave 4s ease-in-out infinite;
  }
  @keyframes wave {
    0%,100% { transform: translateY(0) skewX(0deg); }
    50%     { transform: translateY(-6%) skewX(-3deg); }
  }

  /* Fade-in for list items */
  .hs-fade-in {
    opacity: 0; transform: translateY(8px);
    animation: fadeIn .4s ease-out forwards;
  }
  @keyframes fadeIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* dot blink */
  .hs-dot-blink {
    animation: blink 1.2s ease-in-out infinite;
  }
  @keyframes blink {
    0%,100% { opacity: .25; }
    50%     { opacity: 1; }
  }

  /* ──────────────────────────────────────────────────────────────
     Water waves (ambient bottom layer)
  ────────────────────────────────────────────────────────────── */
  .hs-wv { will-change: transform; }
  .hs-wv-back  { animation: waveScroll 22s linear infinite; }
  .hs-wv-mid   { animation: waveScroll 14s linear infinite reverse; }
  .hs-wv-front { animation: waveScroll  9s linear infinite; }
  @keyframes waveScroll {
    0%   { transform: translateX(0%); }
    100% { transform: translateX(-50%); }
  }

  /* Bubbles */
  .hs-bubble {
    position: absolute;
    border-radius: 50%;
    opacity: 0;
    bottom: 0;
    filter: blur(0.5px);
    will-change: transform, opacity;
  }
  .hs-b0 { left: 12%; width: 5px;  height: 5px;  animation: bubble 9s ease-in 0s infinite; }
  .hs-b1 { left: 28%; width: 3px;  height: 3px;  animation: bubble 7s ease-in 2s infinite; }
  .hs-b2 { left: 46%; width: 6px;  height: 6px;  animation: bubble 11s ease-in 4s infinite; }
  .hs-b3 { left: 68%; width: 4px;  height: 4px;  animation: bubble 8s ease-in 1.5s infinite; }
  .hs-b4 { left: 88%; width: 5px;  height: 5px;  animation: bubble 10s ease-in 3.5s infinite; }
  @keyframes bubble {
    0%   { transform: translateY(0)    scale(0.8); opacity: 0; }
    15%  { opacity: 0.55; }
    85%  { opacity: 0.4; }
    100% { transform: translateY(-200px) scale(1.1); opacity: 0; }
  }

  /* Hide scroll bars but keep functionality */
  .hs-host *::-webkit-scrollbar { display: none; }
  .hs-host * { scrollbar-width: none; }
</style>
</head>
<body>
  <div id="stage">
    <div id="host" class="hs-host"></div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="screens-main.jsx"></script>
  <script type="text/babel" src="screens-capture.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script type="text/babel">
    const DEVICE_W = 393;
    const DEVICE_H = 852;

    function Root() {
      const wrapRef = React.useRef(null);
      const [scale, setScale] = React.useState(1);

      React.useEffect(() => {
        function fit() {
          const pad = 40;
          const sw = window.innerWidth - pad;
          const sh = window.innerHeight - pad;
          const s = Math.min(sw / DEVICE_W, sh / DEVICE_H, 1.05);
          setScale(s);
        }
        fit();
        window.addEventListener('resize', fit);
        return () => window.removeEventListener('resize', fit);
      }, []);

      return (
        <div ref={wrapRef} style={{
          transform: `scale(${scale})`, transformOrigin: 'center center',
        }}>
          <IOSDevice width={DEVICE_W} height={DEVICE_H}>
            <div style={{
              position: 'absolute', inset: 0, overflow: 'hidden',
              borderRadius: 0, isolation: 'isolate',
            }}>
              <App />
            </div>
          </IOSDevice>
        </div>
      );
    }

    // Boot once all scripts ready
    function boot() {
      if (!window.App || !window.IOSDevice || !window.TweaksPanel) {
        return setTimeout(boot, 50);
      }
      ReactDOM.createRoot(document.getElementById('host')).render(<Root/>);
    }
    boot();
  </script>
</body>
</html>
